# Codex CLI config for the helix proxy. Resolved at container start from env
# vars (see docker-compose entrypoint):
#   CODEX_BASE_URL  — helix proxy Responses API base (codex appends /responses)
#   CODEX_MODEL     — model name to use (e.g. agenthub-codex)
# Leave both unset until the proxy supports the Responses API, then set them
# and restart. Codex reads ~/.codex/config.toml on each invocation.

# Top-level defaults (applied without -p) so codex exec uses the helix provider
# automatically. [profiles.*] requires explicit -p selection.
model = "__CODEX_MODEL__"
model_provider = "helix"

[model_providers.helix]
name = "Helix"
base_url = "__CODEX_BASE_URL__"
env_key = "OPENAI_API_KEY"
wire_api = "responses"
