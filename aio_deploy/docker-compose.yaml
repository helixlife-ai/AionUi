name: agent-hub
services:
  agent-hub:
    build:
      context: ..
      dockerfile: Dockerfile
    image: helix-aio.tencentcloudcr.com/application/agent-hub:latest
    container_name: agent-hub
    pull_policy: never
    # The /agent_hub mount is shared with the documents app (file-browser, runs
    # as uid 65532) and openclaw (uid 1000). No single gid covers all consumers,
    # so we rely on world-writable mode (0777) + umask 0000 — acceptable on a
    # single-device appliance where all apps are trusted (like a NAS shared dir).
    user: "0"
    ports:
      - '25808:25808'
    volumes:
      - ./data:/data
      - ${APP_STORAGE_DIR:-/var/helix/app_storage}/documents/data/agent_hub:/agent_hub
      - ./openclaw-models.patch.json:/tmp/openclaw-models.patch.json:ro
      - ./codex-config.toml:/tmp/codex-config.toml:ro
    working_dir: /agent_hub
    environment:
      - AIONUI_PORT=25808
      - AIONUI_DATA_DIR=/data
      - AIONUI_ALLOW_REMOTE=1
      # File-picker root for the WebUI: browse is capped to this directory so
      # users never see container internals (app/bin/boot/…). Mounted above.
      - AIONUI_FS_ROOT=/agent_hub
      # Device serial number — the sole user identifier for the Agent Hub.
      - AIONUI_SERIAL_NUMBER=${SERIAL_NUMBER}
      # keybalance (helix) proxy — Anthropic-compatible. SN doubles as auth token.
      - ANTHROPIC_BASE_URL=https://paas-model.jova.bio/api/v1/helix
      - ANTHROPIC_AUTH_TOKEN=${SERIAL_NUMBER}
      - ANTHROPIC_API_KEY=${SERIAL_NUMBER}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=agenthub-claude
      - ANTHROPIC_DEFAULT_SONNET_MODEL=agenthub-claude
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=agenthub-claude
      - CLAUDE_CODE_MAX_OUTPUT_TOKENS=16000
      # OpenClaw models provider — same SN as auth token for helix proxy.
      - OPENCLAW_API_KEY=${SERIAL_NUMBER}
      # Codex CLI — API key for the helix proxy (Responses API).
      - OPENAI_API_KEY=${SERIAL_NUMBER}
      # Codex CLI — helix proxy Responses API endpoint + model. Codex appends
      # /responses to the base url. Override via env if a different endpoint is needed.
      - CODEX_BASE_URL=${CODEX_BASE_URL:-https://paas-model.jova.bio/api/v1/helix/v1}
      - CODEX_MODEL=${CODEX_MODEL:-agenthub-codex}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # umask 0000 → new files 0666, dirs 0777 (world-writable). The /agent_hub
        # mount is shared with file-browser (uid 65532) and openclaw (uid 1000);
        # world-writable lets all of them read/write without gid juggling.
        umask 0000
        # Ensure the shared /agent_hub mount is world-writable so the documents
        # app and openclaw can operate on files created here (or via command line).
        # Safe to run every start — idempotent.
        chmod -R a+rwX /agent_hub 2>/dev/null || true
        mkdir -p /root/.openclaw
        # Write the OpenClaw models provider config directly. `openclaw config patch`
        # is unreliable here (ordering race with gateway-created config, and the
        # gateway overwrites the file on start). Writing the JSON ourselves before
        # the gateway starts avoids both issues.
        if [ -f /tmp/openclaw-models.patch.json ]; then
          node -e '
            const fs = require("fs");
            const raw = fs.readFileSync("/tmp/openclaw-models.patch.json", "utf8")
              .replace(/__OPENCLAW_API_KEY__/g, process.env.OPENCLAW_API_KEY || "");
            const patch = JSON.parse(raw);
            let cfg = {};
            try { cfg = JSON.parse(fs.readFileSync("/root/.openclaw/openclaw.json", "utf8")); } catch {}
            cfg.models = cfg.models || {};
            cfg.models.mode = patch.models.mode || "merge";
            cfg.models.providers = Object.assign({}, cfg.models.providers, patch.models.providers);
            fs.writeFileSync("/root/.openclaw/openclaw.json", JSON.stringify(cfg, null, 2) + "\n");
          ' 2>/dev/null || true
        fi
        # Resolve the Codex CLI config template. Placeholders __CODEX_BASE_URL__
        # and __CODEX_MODEL__ are substituted from the container env at runtime.
        # $$ escapes the $ from docker-compose interpolation so the shell expands it.
        mkdir -p /root/.codex
        if [ -f /tmp/codex-config.toml ]; then
          sed "s|__CODEX_BASE_URL__|$${CODEX_BASE_URL:-}|g; s|__CODEX_MODEL__|$${CODEX_MODEL:-}|g" \
            /tmp/codex-config.toml > /root/.codex/config.toml
        fi
        # Start the OpenClaw gateway in the background. The ACP OpenClaw agent
        # (`openclaw acp`) connects to this gateway on 127.0.0.1:18789; without
        # it the agent fails with "ACP bridge failed: connect ECONNREFUSED".
        # --bind loopback: only listen locally (ACP agent is same-container).
        # --auth none: no token needed for loopback (container is trusted).
        openclaw gateway run --allow-unconfigured --bind loopback --auth none >/data/logs/openclaw-gateway.log 2>&1 &
        # Wait for the gateway to report ready before launching aionui-web.
        for i in $(seq 1 20); do
          if grep -q "gateway. ready" /data/logs/openclaw-gateway.log 2>/dev/null; then break; fi
          sleep 0.5
        done
        exec /app/aionui-web/aionui-web start
    restart: unless-stopped
